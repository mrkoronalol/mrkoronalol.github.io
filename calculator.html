<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Калькулятор ЗП — Лемана ПРО</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 24px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sync-badge {
            background: #e0e7ff;
            color: #4c1d95;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .period-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 16px;
            border-radius: 20px;
        }

        .period-input {
            flex: 1;
            min-width: 200px;
        }

        .period-input label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 4px;
        }

        .period-input input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
        }

        .period-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .rate-section {
            background: linear-gradient(135deg, #f3e8ff 0%, #e0e7ff 100%);
            padding: 16px 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .rate-info {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .rate-label {
            font-size: 1rem;
            color: #4c1d95;
            font-weight: 500;
        }

        .rate-value {
            font-size: 2rem;
            font-weight: 800;
            color: #4c1d95;
        }

        .rate-unit {
            font-size: 0.9rem;
            color: #6b21a8;
        }

        .edit-rate-btn {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4c1d95;
            cursor: pointer;
        }

        .days-grid {
            margin-bottom: 24px;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 16px;
        }

        .days-header {
            display: grid;
            grid-template-columns: 0.8fr 0.8fr 1fr 1fr 1fr;
            gap: 8px;
            padding: 12px 8px;
            background: #f1f5f9;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #475569;
            margin-bottom: 8px;
            position: sticky;
            top: 0;
        }

        .day-row {
            display: grid;
            grid-template-columns: 0.8fr 0.8fr 1fr 1fr 1fr;
            gap: 8px;
            padding: 12px 8px;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
        }

        .day-name {
            font-weight: 500;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .day-date {
            font-size: 0.7rem;
            color: #64748b;
        }

        .day-type {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
        }

        .type-work { background: #dbeafe; color: #1e40af; }
        .type-off { background: #fef3c7; color: #92400e; }
        .type-vacation { background: #d1fae5; color: #065f46; }

        .shift-info {
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
        }

        .hours-input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
        }

        .hours-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .day-total {
            text-align: right;
            font-weight: 600;
            color: #4c1d95;
            font-size: 0.9rem;
        }

        .summary-section {
            background: #1e293b;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: white;
        }

        .summary-row.total {
            border-top: 2px solid rgba(255,255,255,0.2);
            margin-top: 8px;
            padding-top: 16px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .summary-label {
            color: #94a3b8;
        }

        .summary-value {
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
            flex: 1;
            min-width: 140px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .history-section {
            margin-top: 24px;
        }

        .history-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-title h3 {
            margin: 0;
            color: #1e293b;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .history-item:hover {
            background: #e2e8f0;
        }

        .history-period {
            font-weight: 600;
            color: #1e293b;
        }

        .history-hours {
            font-size: 0.85rem;
            color: #64748b;
        }

        .history-amount {
            font-weight: 700;
            color: #10b981;
        }

        .history-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            background: white;
            padding: 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            h1 { font-size: 1.5rem; }
            .days-header { display: none; }
            .day-row {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 16px 8px;
            }
            .day-total {
                grid-column: 1 / -1;
                text-align: left;
                padding-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="back-btn">← Назад к календарю</a>
            <h1>💰 Калькулятор ЗП</h1>
        </div>
        <div class="subtitle">
            <span>Лемана ПРО — расчёт по часам</span>
            <span class="sync-badge" id="syncBadge">⚡ Синхронизация с Gist</span>
        </div>

        <div class="period-selector">
            <div class="period-input">
                <label>📅 Начало периода</label>
                <input type="date" id="startDate">
            </div>
            <div class="period-input">
                <label>📅 Конец периода</label>
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="rate-section">
            <div class="rate-info">
                <span class="rate-label">Ставка</span>
                <span class="rate-value" id="hourlyRateDisplay">230</span>
                <span class="rate-unit">₽/час</span>
            </div>
            <button class="edit-rate-btn" id="editRateBtn">✏️ Изменить</button>
        </div>

        <div class="days-grid">
            <div class="days-header">
                <span>День</span>
                <span>Дата</span>
                <span>Статус</span>
                <span>Часы</span>
                <span>Сумма</span>
            </div>
            <div id="daysContainer"></div>
        </div>

        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <button class="btn-warning" style="flex:1; padding: 10px;" id="loadFromCalendarBtn">📅 Загрузить из календаря</button>
            <button class="btn-secondary" style="flex:1; padding: 10px;" id="clearHoursBtn">🧹 Очистить часы</button>
        </div>

        <div class="summary-section">
            <div class="summary-row">
                <span class="summary-label">Всего часов</span>
                <span class="summary-value" id="totalHours">0</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Рабочих дней</span>
                <span class="summary-value" id="workedDays">0</span>
            </div>
            <div class="summary-row total">
                <span class="summary-label">Итого к выплате</span>
                <span class="summary-value" id="totalSalary">0 ₽</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="calculateBtn">🔄 Пересчитать</button>
            <button class="btn btn-success" id="savePeriodBtn">💾 Сохранить в Gist</button>
        </div>

        <div class="history-section">
            <div class="history-title">
                <h3>📚 История периодов</h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-secondary" style="padding: 8px 16px;" id="loadHistoryBtn">☁️ Загрузить</button>
                    <button class="btn-secondary" style="padding: 8px 16px;" id="clearHistoryBtn">🗑️ Очистить</button>
                </div>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">Нажмите "Загрузить" для синхронизации</div>
            </div>
        </div>
    </div>

    <div class="modal" id="rateModal">
        <div class="modal-content">
            <h3>💰 Изменить ставку</h3>
            <input type="number" id="newRateInput" placeholder="230" min="0" step="10" value="230">
            <div class="modal-buttons">
                <button class="btn-secondary" id="cancelRateBtn">Отмена</button>
                <button class="btn-primary" id="saveRateBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <span id="loadingText">Загрузка...</span>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        let GIST_ID = localStorage.getItem('gist_id') || '';
        let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
        const CALENDAR_FILENAME = "calendar-data.json";
        const SALARY_FILENAME = "salary-data.json";
        
        let hourlyRate = 230;
        let currentDays = [];
        let periodHistory = [];
        let calendarData = {};

        const STORAGE_RATE_KEY = 'hourly_rate';

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function showLoading(text = 'Загрузка...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function updateSyncBadge() {
            const badge = document.getElementById('syncBadge');
            if (GIST_ID && GITHUB_TOKEN) {
                badge.innerHTML = '✅ Синхронизация активна';
                badge.style.background = '#d1fae5';
                badge.style.color = '#065f46';
            } else if (GIST_ID) {
                badge.innerHTML = '📖 Только чтение';
                badge.style.background = '#fef3c7';
                badge.style.color = '#92400e';
            } else {
                badge.innerHTML = '⚙️ Настройте Gist в календаре';
                badge.style.background = '#fee2e2';
                badge.style.color = '#991b1b';
            }
        }

        // ========== ПАРСИНГ ВРЕМЕНИ СМЕНЫ ==========
        function parseShiftHours(shiftText) {
            if (!shiftText) return 8; // По умолчанию 8 часов
            
            // Поддерживаем оба формата: "02:00 - 08:00" и "02:00–08:00"
            const timeMatch = shiftText.match(/(\d{1,2}):(\d{2})\s*[–-]\s*(\d{1,2}):(\d{2})/);
            
            if (timeMatch) {
                const startHour = parseInt(timeMatch[1]);
                const startMin = parseInt(timeMatch[2]);
                const endHour = parseInt(timeMatch[3]);
                const endMin = parseInt(timeMatch[4]);
                
                let hours = (endHour + endMin/60) - (startHour + startMin/60);
                if (hours < 0) hours += 24; // Если смена переходит через полночь
                
                return hours;
            }
            
            // Пробуем найти просто числа
            const numbersMatch = shiftText.match(/(\d+)/g);
            if (numbersMatch && numbersMatch.length >= 2) {
                const start = parseInt(numbersMatch[0]);
                const end = parseInt(numbersMatch[1]);
                let hours = end - start;
                if (hours < 0) hours += 24;
                return hours;
            }
            
            return 8; // По умолчанию 8 часов
        }

        // ========== РАБОТА С GITHUB GIST ==========
        async function loadCalendarFromGist() {
            if (!GIST_ID) {
                alert('❌ Gist ID не найден. Настройте синхронизацию в календаре.');
                return null;
            }

            try {
                const headers = GITHUB_TOKEN ? { 
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                } : {
                    'Accept': 'application/vnd.github.v3+json'
                };

                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const gistData = await response.json();
                const fileContent = gistData.files[CALENDAR_FILENAME]?.content;
                
                if (fileContent) {
                    calendarData = JSON.parse(fileContent);
                    return calendarData;
                }
                return {};
            } catch (error) {
                console.error('Ошибка загрузки календаря:', error);
                alert('⚠️ Не удалось загрузить данные календаря');
                return null;
            }
        }

        async function loadSalaryFromGist() {
            if (!GIST_ID) return [];

            try {
                const headers = GITHUB_TOKEN ? { 
                    'Authorization': `token ${GITHUB_TOKEN}`,
                } : {};

                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers });
                
                if (!response.ok) return [];

                const gistData = await response.json();
                const fileContent = gistData.files[SALARY_FILENAME]?.content;
                
                if (fileContent) {
                    return JSON.parse(fileContent);
                }
                return [];
            } catch (error) {
                console.error('Ошибка загрузки истории ЗП:', error);
                return [];
            }
        }

        async function saveSalaryToGist() {
            if (!GIST_ID) {
                alert('❌ Gist ID не найден');
                return false;
            }
            if (!GITHUB_TOKEN) {
                alert('❌ Токен не найден. Настройте синхронизацию в календаре.');
                return false;
            }

            try {
                const getRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const gistData = await getRes.json();
                
                const updateRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: "PATCH",
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [SALARY_FILENAME]: { 
                                content: JSON.stringify(periodHistory, null, 2) 
                            }
                        }
                    })
                });

                if (!updateRes.ok) throw new Error(`HTTP ${updateRes.status}`);
                return true;
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('⚠️ Не удалось сохранить данные');
                return false;
            }
        }

        // ========== ЗАГРУЗКА ЧАСОВ ИЗ КАЛЕНДАРЯ ==========
        async function loadHoursFromCalendar() {
            showLoading('Загрузка расписания...');
            
            const data = await loadCalendarFromGist();
            if (!data) {
                hideLoading();
                return;
            }

            let loadedCount = 0;
            
            currentDays.forEach(day => {
                const dateKey = day.date;
                const calendarEntry = data[dateKey];
                
                if (calendarEntry) {
                    // Обновляем тип дня
                    day.type = calendarEntry.type || 'work';
                    day.shiftText = calendarEntry.shiftText || '';
                    
                    // Если рабочий день - считаем часы
                    if (calendarEntry.type === 'work') {
                        day.hours = parseShiftHours(calendarEntry.shiftText);
                        loadedCount++;
                    } else {
                        day.hours = 0; // Выходной или отпуск
                    }
                    
                    // Обновляем отображение в строке
                    const row = document.querySelector(`.day-row[data-date="${day.date}"]`);
                    if (row) {
                        const typeSpan = row.querySelector('.day-type');
                        const shiftSpan = row.querySelector('.shift-info');
                        
                        if (typeSpan) {
                            typeSpan.className = 'day-type';
                            if (day.type === 'work') {
                                typeSpan.classList.add('type-work');
                                typeSpan.textContent = 'Работа';
                            } else if (day.type === 'off') {
                                typeSpan.classList.add('type-off');
                                typeSpan.textContent = 'Выходной';
                            } else if (day.type === 'vacation') {
                                typeSpan.classList.add('type-vacation');
                                typeSpan.textContent = 'Отпуск';
                            }
                        }
                        
                        if (shiftSpan) {
                            shiftSpan.textContent = day.shiftText || (day.type === 'work' ? '8 ч' : '—');
                        }
                    }
                }
            });

            // Обновляем инпуты и суммы
            currentDays.forEach(day => {
                const input = document.querySelector(`[data-date="${day.date}"]`);
                if (input) {
                    input.value = day.hours;
                    updateDayTotal(day.date, day.hours);
                }
            });

            calculateTotal();
            hideLoading();
            alert(`✅ Загружено: ${loadedCount} рабочих дней`);
        }

        // ========== ГЕНЕРАЦИЯ ДНЕЙ ==========
        function generateDays() {
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);
            
            if (isNaN(startDate) || isNaN(endDate) || startDate > endDate) {
                return;
            }
            
            currentDays = [];
            const container = document.getElementById('daysContainer');
            container.innerHTML = '';
            
            const currentDate = new Date(startDate);
            
            while (currentDate <= endDate) {
                const dateStr = currentDate.toISOString().split('T')[0];
                const dayOfWeek = currentDate.toLocaleDateString('ru-RU', { weekday: 'short' });
                const dayOfMonth = currentDate.getDate();
                const monthShort = currentDate.toLocaleDateString('ru-RU', { month: 'short' });
                
                // Получаем тип дня из уже загруженных данных календаря
                let dayType = 'work';
                let typeClass = 'type-work';
                let typeText = 'Работа';
                let shiftText = '';
                
                if (calendarData[dateStr]) {
                    dayType = calendarData[dateStr].type;
                    shiftText = calendarData[dateStr].shiftText || '';
                    
                    if (dayType === 'off') {
                        typeClass = 'type-off';
                        typeText = 'Выходной';
                    } else if (dayType === 'vacation') {
                        typeClass = 'type-vacation';
                        typeText = 'Отпуск';
                    }
                }
                
                const dayData = {
                    date: dateStr,
                    dayName: dayOfWeek,
                    dayNum: dayOfMonth,
                    type: dayType,
                    shiftText: shiftText,
                    hours: 0
                };
                
                currentDays.push(dayData);
                
                const row = document.createElement('div');
                row.className = 'day-row';
                row.dataset.date = dateStr;
                
                row.innerHTML = `
                    <div>
                        <div class="day-name">${dayOfWeek}</div>
                    </div>
                    <div>
                        <div class="day-date">${dayOfMonth} ${monthShort}</div>
                    </div>
                    <div>
                        <span class="day-type ${typeClass}">${typeText}</span>
                        <div class="shift-info">${shiftText || (dayType === 'work' ? '8 ч' : '—')}</div>
                    </div>
                    <div>
                        <input type="number" 
                               class="hours-input" 
                               data-date="${dateStr}" 
                               min="0" 
                               max="24" 
                               step="0.5" 
                               value="0"
                               placeholder="Часы">
                    </div>
                    <div class="day-total" data-total="${dateStr}">0 ₽</div>
                `;
                
                container.appendChild(row);
                
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            // Привязываем события к инпутам
            document.querySelectorAll('.hours-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const date = e.target.dataset.date;
                    const hours = parseFloat(e.target.value) || 0;
                    const day = currentDays.find(d => d.date === date);
                    if (day) day.hours = hours;
                    
                    updateDayTotal(date, hours);
                    calculateTotal();
                });
            });
            
            calculateTotal();
        }

        function updateDayTotal(date, hours) {
            const totalEl = document.querySelector(`[data-total="${date}"]`);
            if (totalEl) {
                const amount = hours * hourlyRate;
                totalEl.textContent = `${Math.round(amount).toLocaleString()} ₽`;
            }
        }

        function calculateTotal() {
            let totalHours = 0;
            let workedDays = 0;
            
            currentDays.forEach(day => {
                const hours = day.hours || 0;
                if (hours > 0) {
                    totalHours += hours;
                    workedDays++;
                }
            });
            
            const totalSalary = totalHours * hourlyRate;
            
            document.getElementById('totalHours').textContent = totalHours.toFixed(1);
            document.getElementById('workedDays').textContent = workedDays;
            document.getElementById('totalSalary').textContent = `${Math.round(totalSalary).toLocaleString()} ₽`;
            
            return { totalHours, workedDays, totalSalary };
        }

        // ========== СОХРАНЕНИЕ ПЕРИОДА ==========
        async function savePeriod() {
            const stats = calculateTotal();
            
            if (stats.totalHours === 0) {
                alert('Нет отработанных часов для сохранения');
                return;
            }
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            const period = {
                id: Date.now(),
                startDate,
                endDate,
                days: currentDays.map(d => ({ 
                    date: d.date, 
                    hours: d.hours, 
                    type: d.type,
                    shiftText: d.shiftText 
                })),
                totalHours: stats.totalHours,
                workedDays: stats.workedDays,
                totalSalary: stats.totalSalary,
                hourlyRate: hourlyRate,
                savedAt: new Date().toISOString()
            };
            
            periodHistory.unshift(period);
            
            if (periodHistory.length > 50) {
                periodHistory = periodHistory.slice(0, 50);
            }
            
            renderHistory();
            
            if (GIST_ID && GITHUB_TOKEN) {
                showLoading('Сохранение в Gist...');
                const success = await saveSalaryToGist();
                hideLoading();
                
                if (success) {
                    alert(`✅ Период сохранен в Gist!\nЧасов: ${stats.totalHours.toFixed(1)}\nСумма: ${Math.round(stats.totalSalary).toLocaleString()} ₽`);
                } else {
                    alert(`⚠️ Сохранено локально\nЧасов: ${stats.totalHours.toFixed(1)}\nСумма: ${Math.round(stats.totalSalary).toLocaleString()} ₽`);
                }
            } else {
                alert(`✅ Период сохранен локально!\nЧасов: ${stats.totalHours.toFixed(1)}\nСумма: ${Math.round(stats.totalSalary).toLocaleString()} ₽`);
            }
        }

        // ========== ИСТОРИЯ ==========
        async function loadHistory() {
            if (GIST_ID) {
                showLoading('Загрузка истории...');
                const history = await loadSalaryFromGist();
                if (history.length > 0) {
                    periodHistory = history;
                }
                hideLoading();
            }
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            
            if (periodHistory.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет сохраненных периодов</div>';
                return;
            }
            
            container.innerHTML = periodHistory.slice(0, 10).map(period => {
                const start = new Date(period.startDate).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
                const end = new Date(period.endDate).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
                
                return `
                    <div class="history-item" data-id="${period.id}">
                        <div style="flex:1;">
                            <div class="history-period">${start} — ${end}</div>
                            <div class="history-hours">${period.totalHours.toFixed(1)} ч · ${period.workedDays} дн · ${period.hourlyRate}₽/ч</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="history-amount">${Math.round(period.totalSalary).toLocaleString()} ₽</span>
                            <button class="history-delete" data-id="${period.id}">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('history-delete')) return;
                    const id = parseInt(item.dataset.id);
                    loadPeriod(id);
                });
            });
            
            container.querySelectorAll('.history-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    await deletePeriod(id);
                });
            });
        }

        function loadPeriod(id) {
            const period = periodHistory.find(p => p.id === id);
            if (!period) return;
            
            if (!confirm(`Загрузить период ${period.startDate} — ${period.endDate}?`)) {
                return;
            }
            
            hourlyRate = period.hourlyRate;
            localStorage.setItem(STORAGE_RATE_KEY, hourlyRate);
            document.getElementById('hourlyRateDisplay').textContent = hourlyRate;
            
            document.getElementById('startDate').value = period.startDate;
            document.getElementById('endDate').value = period.endDate;
            
            generateDays();
            
            period.days.forEach(savedDay => {
                const day = currentDays.find(d => d.date === savedDay.date);
                if (day) {
                    day.hours = savedDay.hours;
                    const input = document.querySelector(`[data-date="${savedDay.date}"]`);
                    if (input) {
                        input.value = savedDay.hours;
                        updateDayTotal(savedDay.date, savedDay.hours);
                    }
                }
            });
            
            calculateTotal();
        }

        async function deletePeriod(id) {
            if (!confirm('Удалить этот период из истории?')) return;
            
            periodHistory = periodHistory.filter(p => p.id !== id);
            renderHistory();
            
            if (GIST_ID && GITHUB_TOKEN) {
                await saveSalaryToGist();
            }
        }

        async function clearHistory() {
            if (!confirm('Очистить всю историю?')) return;
            
            periodHistory = [];
            renderHistory();
            
            if (GIST_ID && GITHUB_TOKEN) {
                await saveSalaryToGist();
            }
        }

        function saveNewRate() {
            const newRate = parseFloat(document.getElementById('newRateInput').value);
            if (newRate && newRate > 0) {
                hourlyRate = newRate;
                localStorage.setItem(STORAGE_RATE_KEY, hourlyRate);
                document.getElementById('hourlyRateDisplay').textContent = hourlyRate;
                
                currentDays.forEach(day => {
                    updateDayTotal(day.date, day.hours);
                });
                calculateTotal();
            }
            document.getElementById('rateModal').style.display = 'none';
        }

        function clearAllHours() {
            currentDays.forEach(day => day.hours = 0);
            
            document.querySelectorAll('.hours-input').forEach(input => {
                input.value = 0;
                updateDayTotal(input.dataset.date, 0);
            });
            
            calculateTotal();
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            GIST_ID = localStorage.getItem('gist_id') || '';
            GITHUB_TOKEN = localStorage.getItem('github_token') || '';
            
            const savedRate = localStorage.getItem(STORAGE_RATE_KEY);
            if (savedRate) hourlyRate = parseFloat(savedRate);
            document.getElementById('hourlyRateDisplay').textContent = hourlyRate;
            
            updateSyncBadge();
            
            if (GIST_ID) {
                showLoading('Загрузка календаря...');
                await loadCalendarFromGist();
                hideLoading();
            }
            
            const today = new Date();
            const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
            
            document.getElementById('startDate').valueAsDate = monthStart;
            document.getElementById('endDate').valueAsDate = today;
            
            generateDays();
            bindEvents();
        }

        function bindEvents() {
            document.getElementById('startDate').addEventListener('change', generateDays);
            document.getElementById('endDate').addEventListener('change', generateDays);
            document.getElementById('calculateBtn').addEventListener('click', calculateTotal);
            document.getElementById('loadFromCalendarBtn').addEventListener('click', loadHoursFromCalendar);
            document.getElementById('clearHoursBtn').addEventListener('click', clearAllHours);
            document.getElementById('savePeriodBtn').addEventListener('click', savePeriod);
            document.getElementById('loadHistoryBtn').addEventListener('click', loadHistory);
            document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
            document.getElementById('editRateBtn').addEventListener('click', () => {
                document.getElementById('newRateInput').value = hourlyRate;
                document.getElementById('rateModal').style.display = 'flex';
            });
            document.getElementById('cancelRateBtn').addEventListener('click', () => {
                document.getElementById('rateModal').style.display = 'none';
            });
            document.getElementById('saveRateBtn').addEventListener('click', saveNewRate);
            
            document.getElementById('rateModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('rateModal')) {
                    document.getElementById('rateModal').style.display = 'none';
                }
            });
        }

        init();
    </script>
</body>
</html>
