<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* Все стили оставлены без изменений */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #eef2f9;

}

.container {

    background: white;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);

}

/* Стили для модального окна настроек */
.settings-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 16px;
}

.settings-content {
    background: white;
    padding: 24px;
    border-radius: 32px;
    max-width: 500px;

}

.settings-content input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-family: monospace;
}

.info-box {
    background: #f1f5f9;
    padding: 12px;
    border-radius: 12px;
    margin: 16px 0;
    font-size: 0.85rem;
}

.info-box a {
    color: #3b82f6;
    text-decoration: none;
}

/* Остальные стили как были */
.login-container {
    max-width: 400px;
    margin: 100px auto;
    background: white;
    border-radius: 28px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 20px 35px rgba(0,0,0,0.1);
}

.login-container h2 {
    margin-bottom: 24px;
    color: #1e293b;
}

.login-container input {
    width: 100%;
    padding: 14px;
    font-size: 1.2rem;
    text-align: center;
    border: 2px solid #e2e8f0;
    border-radius: 60px;
    margin-bottom: 20px;
    font-family: monospace;
    letter-spacing: 4px;
}

.login-container button {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    background: #2b6e4f;
    color: white;
    border: none;
    border-radius: 60px;
    cursor: pointer;
}

.error-message {
    color: #dc2626;
    margin-top: 12px;
    font-size: 0.85rem;
}

.header-flex {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
}

h1 {
    font-size: 1.5rem;
    margin: 0;
    background: linear-gradient(135deg, #1e293b, #2d3a4e);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f1f5f9;
    padding: 4px 12px 4px 16px;
    border-radius: 40px;
    font-size: 0.85rem;
}

.logout-btn, .settings-btn {

    font-size: 0.7rem;
    border: none;
    border-radius: 40px;
    cursor: pointer;
}

.logout-btn {
    background: #ef4444;
    color: white;
}

.settings-btn {
    background: #64748b;
    color: white;
}

.month-nav {
    display: flex;
    gap: 8px;
    align-items: center;
    background: #f1f5f9;
    padding: 4px 12px;
    border-radius: 48px;
}

.month-nav button {
    background: white;
    border: none;
    font-size: 1.2rem;
    font-weight: bold;
    width: 36px;
    height: 36px;
    border-radius: 40px;

}

.month-nav span {

    font-size: 1rem;

}

.actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 12px 0 16px 0;
    align-items: center;

}

.btn-group {

    gap: 10px;

}

button {
    padding: 8px 16px;

    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    background: #1e293b;
    color: white;
    font-size: 0.8rem;

}

button:active {

}

button:disabled {

    cursor: not-allowed;
}

}

}

.sync-status.success {

}

.sync-status.error {

}

.weekday-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);

}

}

}

.modal-content h3 {

}

.modal-content textarea {

    border: 1px solid #cbd5e1;

}

.modal-buttons {

.edit-modal {

.edit-modal-content {

}

.edit-modal-content select, .edit-modal-content input {

    border-radius: 60px;

}

.empty-cell {
    background: #fafcff;
    opacity: 0.45;
    cursor: default;
    min-height: 70px;
}

.loader {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #f3f3f3;
    border-top: 2px solid #3498db;
    border-radius: 50%;

@keyframes spin {

    100% { transform: rotate(360deg); }
}

@media (max-width: 600px) {

</style>

<body>

<!-- Модальное окно настроек -->
<div class="settings-modal" id="settingsModal">

<script>
// ========== НАСТРОЙКИ (БЕЗОПАСНО - ВВОДИТ ПОЛЬЗОВАТЕЛЬ) ==========
let GIST_ID = localStorage.getItem('gist_id') || '';
let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
const GIST_FILENAME = "calendar-data.json";
const VALID_PASSWORD = "3200";
const STORAGE_AUTH_KEY = "calendar_authenticated";

// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
let currentYear = 2026;
let currentMonth = 3;
let scheduleData = {};
let pendingChanges = {};
let isLoading = false;
let saveTimeout = null;
let isSyncing = false;
const DEFAULT_PROJECT = "Лемана ПРО_B2C_голос_вход";
let syncStatusTimeout = null;

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getDateKey(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
}

function showSyncStatus(message, type) {
    const statusDiv = document.getElementById("syncStatus");
    if (syncStatusTimeout) clearTimeout(syncStatusTimeout);
    
    if (type === 'loading') {
        statusDiv.className = "sync-status loading";
        statusDiv.innerHTML = message;
    } else if (type === 'success') {
        statusDiv.className = "sync-status success";
        statusDiv.innerHTML = message;
        syncStatusTimeout = setTimeout(() => {
            statusDiv.className = "sync-status";
            statusDiv.innerHTML = "☁️ GitHub Gist";
        }, 2500);
    } else if (type === 'error') {
        statusDiv.className = "sync-status error";
        statusDiv.innerHTML = message;
        syncStatusTimeout = setTimeout(() => {
            statusDiv.className = "sync-status";
            statusDiv.innerHTML = "☁️ GitHub Gist";
        }, 3000);
    }
}

function updateStorageMode() {
    const modeEl = document.getElementById('storageMode');
    if (GITHUB_TOKEN) {
        modeEl.innerHTML = '💾 Запись включена';
        modeEl.style.color = '#059669';
    } else {
        modeEl.innerHTML = '📖 Только чтение';
        modeEl.style.color = '#64748b';
    }
}

// ========== УПРАВЛЕНИЕ АВТОРИЗАЦИЕЙ ==========
function saveAuthToStorage() {
    localStorage.setItem(STORAGE_AUTH_KEY, "true");
}

function clearAuthFromStorage() {
    localStorage.removeItem(STORAGE_AUTH_KEY);
}

function isAuthenticatedInStorage() {
    return localStorage.getItem(STORAGE_AUTH_KEY) === "true";
}

function showLoginScreen() {
    document.getElementById("loginScreen").style.display = "block";
    document.getElementById("mainApp").style.display = "none";
    document.getElementById("passwordInput").value = "";
    document.getElementById("loginError").textContent = "";
}

function showMainApp() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("gistIdInput").value = GIST_ID;
    document.getElementById("githubTokenInput").value = GITHUB_TOKEN;
    updateStorageMode();
}

// ========== СИНХРОНИЗАЦИЯ С GITHUB GIST ==========
async function loadFromGist() {
    if (!GIST_ID) {
        showSyncStatus("⚠️ Укажите Gist ID в настройках", "error");
        return;
    }
    
    if (isLoading) return;
    isLoading = true;
    
    showSyncStatus("☁️ Загрузка из Gist...", "loading");
    const refreshBtn = document.getElementById("refreshBtn");
    if (refreshBtn) refreshBtn.disabled = true;
    
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const headers = GITHUB_TOKEN ? { 
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
        } : {
            'Accept': 'application/vnd.github.v3+json'
        };
        
        const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            signal: controller.signal,
            headers: headers
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
            if (response.status === 401) {
                throw new Error("Неверный токен");
            } else if (response.status === 404) {
                throw new Error("Gist не найден");
            }
            throw new Error(`HTTP ${response.status}`);
        }
        
        const gistData = await response.json();
        const fileContent = gistData.files[GIST_FILENAME]?.content;
        
        if (fileContent) {
            try {
                const cloudData = JSON.parse(fileContent);
                let updatedCount = 0;
                
                for (const key in cloudData) {
                    if (!scheduleData[key] || 
                        (cloudData[key].updatedAt && scheduleData[key].updatedAt && 
                         cloudData[key].updatedAt > scheduleData[key].updatedAt)) {
                        scheduleData[key] = cloudData[key];
                        updatedCount++;
                    }
                }
                showSyncStatus(`✅ Загружено ${updatedCount} записей`, "success");
            } catch (e) {
                showSyncStatus("⚠️ Ошибка формата JSON", "error");
            }
        } else {
            if (Object.keys(scheduleData).length === 0) initDefaultApril();
            showSyncStatus("📝 Новый календарь", "success");
        }
        
        renderCalendar();
    } catch (error) {
        console.error("Ошибка загрузки:", error);
        showSyncStatus(`⚠️ ${error.message}`, "error");
        if (Object.keys(scheduleData).length === 0) {
            initDefaultApril();
            renderCalendar();
        }
    } finally {
        isLoading = false;
        if (refreshBtn) refreshBtn.disabled = false;
    }
}

async function saveChangesToGist(silent = false) {
    if (isSyncing) return false;
    if (Object.keys(pendingChanges).length === 0) return true;
    if (!GITHUB_TOKEN) {
        if (!silent) showSyncStatus("🔒 Нужен токен для сохранения", "error");
        return false;
    }
    if (!GIST_ID) {
        if (!silent) showSyncStatus("⚠️ Укажите Gist ID", "error");
        return false;
    }
    
    isSyncing = true;
    const changesToSend = { ...pendingChanges };
    
    if (!silent) showSyncStatus(`💾 Сохранение...`, "loading");
    
    try {
        const getRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        const gistData = await getRes.json();
        let currentContent = {};
        try {
            currentContent = JSON.parse(gistData.files[GIST_FILENAME]?.content || "{}");
        } catch (e) {}
        
        const newContent = { ...currentContent, ...changesToSend };
        
        const updateRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                files: { [GIST_FILENAME]: { content: JSON.stringify(newContent, null, 2) } }
            })
        });
        
        if (!updateRes.ok) throw new Error(`HTTP ${updateRes.status}`);
        
        for (const key in changesToSend) delete pendingChanges[key];
        if (!silent) showSyncStatus(`✅ Сохранено`, "success");
        return true;
        
    } catch (error) {
        console.error("Ошибка сохранения:", error);
        if (!silent) showSyncStatus("⚠️ Ошибка сохранения", "error");
        return false;
    } finally {
        isSyncing = false;
    }
}

function saveToGistDebounced() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveChangesToGist(false), 1000);
}

// ========== РАБОТА С ДАННЫМИ ==========
async function setDayData(year, month, day, type, shiftText, project) {
    const key = getDateKey(year, month, day);
    const value = { 
        type, 
        shiftText: shiftText || (type === "work" ? "02:00–08:00" : ""), 
        project: project || DEFAULT_PROJECT,
        updatedAt: Date.now()
    };
    
    scheduleData[key] = value;
    pendingChanges[key] = value;
    
    renderCalendar();
    saveToGistDebounced();
}

function getDayData(year, month, day) {
    const key = getDateKey(year, month, day);
    if (scheduleData[key]) return scheduleData[key];
    return { type: "work", shiftText: "02:00–08:00", project: DEFAULT_PROJECT, updatedAt: 0 };
}

function initDefaultApril() {
    const defaultTypes = {
        1:"work",2:"work",3:"work",4:"off",5:"work",6:"work",
        7:"off",8:"off",9:"off",10:"off",11:"work",12:"off",
        13:"work",14:"work",15:"work",16:"off",17:"work",18:"work",
        19:"off",20:"off",21:"work",22:"work",23:"off",24:"off",
        25:"work",26:"work",27:"vacation",28:"vacation",29:"vacation",30:"vacation"
    };
    for (let d = 1; d <= 30; d++) {
        let type = defaultTypes[d];
        let shift = (type === "work") ? "02:00–08:00" : "";
        const key = getDateKey(2026, 3, d);
        scheduleData[key] = { type, shiftText: shift, project: DEFAULT_PROJECT, updatedAt: Date.now() };
        pendingChanges[key] = scheduleData[key];
    }
}

function renderCalendar() {
    const calendarDiv = document.getElementById("calendar");
    if (!calendarDiv) return;
    calendarDiv.innerHTML = "";
    
    const firstDay = new Date(currentYear, currentMonth, 1);
    let startWeekday = firstDay.getDay();
    let startOffset = (startWeekday === 0 ? 6 : startWeekday - 1);
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const todayDate = new Date();
    const isCurrentMonthView = (todayDate.getFullYear() === currentYear && todayDate.getMonth() === currentMonth);
    
    for (let i = 0; i < startOffset; i++) {
        const emptyDiv = document.createElement("div");
        emptyDiv.className = "day empty-cell";
        emptyDiv.innerHTML = `<div class="date"></div>`;
        calendarDiv.appendChild(emptyDiv);
    }
    
    for (let d = 1; d <= daysInMonth; d++) {
        const dayData = getDayData(currentYear, currentMonth, d);
        const type = dayData.type;
        let shiftDisplay = "";
        if (type === "work") shiftDisplay = dayData.shiftText || "02:00–08:00";
        else if (type === "off") shiftDisplay = "Выходной";
        else shiftDisplay = "Отпуск";
        
        let extraInfo = type === "work" ? `⚡ ${escapeHtml(shiftDisplay)}` : 
                       (type === "off" ? `🌿 ${escapeHtml(shiftDisplay)}` : `🏖️ ${escapeHtml(shiftDisplay)}`);
        
        if (dayData.project && dayData.project !== DEFAULT_PROJECT) {
            const projectShort = dayData.project.substring(0, 16);
            extraInfo += ` · ${escapeHtml(projectShort)}`;
        }
        
        const dayDiv = document.createElement("div");
        dayDiv.className = `day ${type}`;
        if (isCurrentMonthView && todayDate.getDate() === d) dayDiv.classList.add("today");
        dayDiv.innerHTML = `<div class="date">${d}</div><div class="day-text">${extraInfo}</div>`;
        dayDiv.onclick = () => openEditModal(d);
        calendarDiv.appendChild(dayDiv);
    }
    
    const totalCells = startOffset + daysInMonth;
    const remainingCells = (7 - (totalCells % 7)) % 7;
    for (let i = 0; i < remainingCells; i++) {
        const emptyDiv = document.createElement("div");
        emptyDiv.className = "day empty-cell";
        emptyDiv.innerHTML = `<div class="date"></div>`;
        calendarDiv.appendChild(emptyDiv);
    }
    
    const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
    document.getElementById("monthYearLabel").innerHTML = `${monthNames[currentMonth]} ${currentYear}`;
}

function openEditModal(day) {
    const existing = getDayData(currentYear, currentMonth, day);
    const modal = document.getElementById("editModal");
    const content = document.getElementById("editModalContent");
    content.innerHTML = `
        <h3>✏️ ${day} ${currentMonth+1}.${currentYear}</h3>
        <select id="editTypeSelect">
            <option value="work" ${existing.type === "work" ? "selected" : ""}>Работа</option>
            <option value="off" ${existing.type === "off" ? "selected" : ""}>Выходной</option>
            <option value="vacation" ${existing.type === "vacation" ? "selected" : ""}>Отпуск</option>
        </select>
        <div id="shiftBlock">
            <input type="text" id="editShiftInput" placeholder="02:00–08:00" value="${escapeHtml(existing.shiftText || "02:00–08:00")}">
        </div>
        <input type="text" id="editProjectInput" value="${escapeHtml(existing.project || DEFAULT_PROJECT)}" placeholder="Проект">
        <div class="modal-buttons">
            <button id="saveEditBtn">💾 Сохранить</button>
            <button id="cancelEditBtn">Отмена</button>
        </div>
    `;
    modal.style.display = "flex";
    
    const typeSelect = document.getElementById("editTypeSelect");
    const shiftBlock = document.getElementById("shiftBlock");
    
    const toggleShiftBlock = () => { shiftBlock.style.display = typeSelect.value === "work" ? "block" : "none"; };
    typeSelect.onchange = toggleShiftBlock;
    toggleShiftBlock();
    
    document.getElementById("saveEditBtn").onclick = async () => {
        const newType = typeSelect.value;
        let newShift = newType === "work" ? document.getElementById("editShiftInput").value.trim() : "";
        if (newType === "work" && !newShift) newShift = "02:00–08:00";
        const newProject = document.getElementById("editProjectInput").value.trim() || DEFAULT_PROJECT;
        await setDayData(currentYear, currentMonth, day, newType, newShift, newProject);
        modal.style.display = "none";
    };
    document.getElementById("cancelEditBtn").onclick = () => modal.style.display = "none";
}

function parseScheduleFromText(rawText, targetYear, targetMonth) {
    const lines = rawText.split(/\r?\n/);
    const updates = {};
    const errors = [];
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;
        const dateMatch = line.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        if (!dateMatch) continue;
        let day = parseInt(dateMatch[1]), month = parseInt(dateMatch[2]), year = parseInt(dateMatch[3]);
        if (year !== targetYear || month !== (targetMonth + 1)) { errors.push(`${line} - неверный месяц`); continue; }
        if (day < 1 || day > new Date(year, month, 0).getDate()) { errors.push(`${line} - неверный день`); continue; }
        i++;
        while (i < lines.length && !lines[i].trim()) i++;
        if (i >= lines.length) { errors.push(`${line} - нет смены`); break; }
        let shiftDesc = lines[i].trim();
        i++;
        while (i < lines.length && /^\d+$/.test(lines[i].trim())) i++;
        while (i < lines.length && !lines[i].trim()) i++;
        let project = DEFAULT_PROJECT;
        if (i < lines.length && lines[i].trim() && !lines[i].trim().match(/^\d{1,2}\.\d{2}\.\d{4}/)) { project = lines[i].trim(); i++; }
        let type = "work", shiftText = "";
        const lowerShift = shiftDesc.toLowerCase();
        if (lowerShift.includes("выходной") || lowerShift.includes("off")) type = "off";
        else if (lowerShift.includes("отпуск") || lowerShift.includes("vacation")) type = "vacation";
        else shiftText = shiftDesc;
        updates[getDateKey(year, month - 1, day)] = { type, shiftText, project, updatedAt: Date.now() };
    }
    return { updates, errors };
}

async function importSchedule(rawText) {
    const { updates, errors } = parseScheduleFromText(rawText, currentYear, currentMonth);
    if (errors.length > 0) alert(`⚠️ Ошибки:\n${errors.join('\n')}`);
    if (Object.keys(updates).length === 0) { alert("❌ Нет корректных дат"); return false; }
    for (const [key, value] of Object.entries(updates)) { scheduleData[key] = value; pendingChanges[key] = value; }
    renderCalendar();
    saveToGistDebounced();
    alert(`✅ Импортировано ${Object.keys(updates).length} дней`);
    return true;
}

async function resetCurrentMonth() {
    if (!confirm(`⚠️ Сбросить ${currentMonth+1}.${currentYear}?`)) return;
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
        const key = getDateKey(currentYear, currentMonth, d);
        const value = { type: "work", shiftText: "02:00–08:00", project: DEFAULT_PROJECT, updatedAt: Date.now() };
        scheduleData[key] = value; pendingChanges[key] = value;
    }
    renderCalendar(); saveToGistDebounced(); alert("✅ Сброшено");
}

function changeMonth(delta) {
    let newMonth = currentMonth + delta, newYear = currentYear;
    if (newMonth < 0) { newMonth = 11; newYear--; }
    if (newMonth > 11) { newMonth = 0; newYear++; }
    currentYear = newYear; currentMonth = newMonth; renderCalendar();
}

async function exportPNG() {
    const element = document.getElementById("capture"), btn = document.getElementById("exportPngBtn");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loader"></span> Генерация...'; btn.disabled = true;
    try {
        const canvas = await html2canvas(element, { scale: 2, backgroundColor: "#ffffff", logging: false });
        const link = document.createElement("a");
        link.download = `calendar_${currentYear}_${String(currentMonth+1).padStart(2,'0')}.png`;
        link.href = canvas.toDataURL(); link.click();
    } catch (error) { alert("Ошибка PNG"); }
    finally { btn.innerHTML = originalText; btn.disabled = false; }
}

async function exportPDF() {
    const element = document.getElementById("capture"), btn = document.getElementById("exportPdfBtn");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loader"></span> Генерация...'; btn.disabled = true;
    try {
        const canvas = await html2canvas(element, { scale: 2, backgroundColor: "#ffffff" });
        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 210, imgHeight = (canvas.height * imgWidth) / canvas.width;
        let heightLeft = imgHeight, position = 0;
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
        heightLeft -= (pdf.internal.pageSize.getHeight());
        while (heightLeft > 0) { position = heightLeft - imgHeight; pdf.addPage(); pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight); heightLeft -= (pdf.internal.pageSize.getHeight()); }
        pdf.save(`calendar_${currentYear}_${String(currentMonth+1).padStart(2,'0')}.pdf`);
    } catch (error) { alert("Ошибка PDF"); }
    finally { btn.innerHTML = originalText; btn.disabled = false; }
}

// ========== ИНИЦИАЛИЗАЦИЯ ==========
async function initApp() {
    // Настройки
    document.getElementById("settingsBtn").onclick = () => {
        document.getElementById("gistIdInput").value = GIST_ID;
        document.getElementById("githubTokenInput").value = GITHUB_TOKEN;
        document.getElementById("settingsModal").style.display = "flex";
    };
    
    document.getElementById("saveSettingsBtn").onclick = () => {
        GIST_ID = document.getElementById("gistIdInput").value.trim();
        GITHUB_TOKEN = document.getElementById("githubTokenInput").value.trim();
        localStorage.setItem('gist_id', GIST_ID);
        localStorage.setItem('github_token', GITHUB_TOKEN);
        document.getElementById("settingsModal").style.display = "none";
        updateStorageMode();
        showSyncStatus("⚙️ Настройки сохранены", "success");
    };
    
    document.getElementById("closeSettingsBtn").onclick = () => {
        document.getElementById("settingsModal").style.display = "none";
    };
    
    // Логин
    document.getElementById("loginBtn").onclick = () => {
        if (document.getElementById("passwordInput").value === VALID_PASSWORD) {
            saveAuthToStorage(); showMainApp(); loadFromGist();
        } else {
            document.getElementById("loginError").textContent = "❌ Неверный пароль";
        }
    };
    document.getElementById("passwordInput").onkeypress = (e) => { if (e.key === "Enter") document.getElementById("loginBtn").click(); };
    document.getElementById("logoutBtn").onclick = () => { clearAuthFromStorage(); scheduleData = {}; pendingChanges = {}; showLoginScreen(); };
    
    // Импорт
    const importModal = document.getElementById("importModal");
    document.getElementById("showImportBtn").onclick = () => importModal.style.display = "flex";
    document.getElementById("closeImportBtn").onclick = () => importModal.style.display = "none";
    document.getElementById("applyImportBtn").onclick = async () => {
        const text = document.getElementById("importText").value;
        if (text.trim()) await importSchedule(text);
        importModal.style.display = "none";
    };
    
    // Кнопки управления
    document.getElementById("refreshBtn").onclick = () => loadFromGist();
    document.getElementById("resetToDefaultBtn").onclick = () => resetCurrentMonth();
    document.getElementById("prevMonthBtn").onclick = () => changeMonth(-1);
    document.getElementById("nextMonthBtn").onclick = () => changeMonth(1);
    document.getElementById("exportPngBtn").onclick = () => exportPNG();
    document.getElementById("exportPdfBtn").onclick = () => exportPDF();
    
    // Закрытие модалок
    window.onclick = (e) => {
        if (e.target === document.getElementById("editModal")) document.getElementById("editModal").style.display = "none";
        if (e.target === importModal) importModal.style.display = "none";
        if (e.target === document.getElementById("settingsModal")) document.getElementById("settingsModal").style.display = "none";
    };
    
    // Загрузка сохраненных настроек
    if (localStorage.getItem('gist_id')) GIST_ID = localStorage.getItem('gist_id');
    if (localStorage.getItem('github_token')) GITHUB_TOKEN = localStorage.getItem('github_token');
    
    if (isAuthenticatedInStorage()) { showMainApp(); await loadFromGist(); }
    else { showLoginScreen(); }
}

initApp();
</script>
